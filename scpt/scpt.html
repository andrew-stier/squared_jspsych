    <script src="../jspsych/dist/jspsych.js"></script>

    <div id="display_stage" style="width:100vw; height:100vh; background:#444444;"></div>
</body>
<script>
    // Standalone harness: prompt for participant ID, then load + run the
    // Qualtrics-loadable script (which checks window.QUALTRICS_PID first).
    window.QUALTRICS_PID = window.prompt('Participant ID:', 'test');
    if (!window.QUALTRICS_PID) { window.QUALTRICS_PID = 'anon_' + Date.now(); }
</script>
<script src="scpt_qualtrics.js"></script>
<script>
    // The Qualtrics build defines initExp(); call it here in standalone.
    if (typeof initExp === 'function') initExp();
</script>
